name: Release

on:
  push:
    branches:
      - main
    paths:
      - src/**
      - build.py
      - .github/workflows/release.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Read provider version
        id: version
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import ast
          import re
          from pathlib import Path

          source = Path("src/__init__.py").read_text(encoding="utf-8")
          match = re.search(r"^PROVIDER_VERSION\s*=\s*(\([^)]+\))", source, re.M)
          if not match:
              raise SystemExit("PROVIDER_VERSION not found in src/__init__.py")

          version_tuple = ast.literal_eval(match.group(1))
          if (
              not isinstance(version_tuple, tuple)
              or not version_tuple
              or not all(isinstance(part, int) for part in version_tuple)
          ):
              raise SystemExit(f"Invalid PROVIDER_VERSION: {version_tuple!r}")

          version = ".".join(str(part) for part in version_tuple)
          print(f"version={version}")
          print(f"tag=v{version}")
          PY

      - name: Validate release tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            TAG_SHA="$(git rev-list -n 1 "${TAG}")"
            HEAD_SHA="$(git rev-parse HEAD)"
            if [ "${TAG_SHA}" != "${HEAD_SHA}" ]; then
              echo "::error::Release tag ${TAG} already exists on ${TAG_SHA}. Bump PROVIDER_VERSION before publishing this commit."
              exit 1
            fi
          else
            git tag "${TAG}"
            git push origin "${TAG}"
          fi

      - name: Build plugin package
        run: python build.py

      - name: Verify package
        run: |
          test -f out/NewDouban.zip
          unzip -l out/NewDouban.zip

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" out/NewDouban.zip --clobber
          else
            gh release create "${TAG}" out/NewDouban.zip \
              --title "NewDouban ${VERSION}" \
              --notes "Release generated from PROVIDER_VERSION ${VERSION}."
          fi
